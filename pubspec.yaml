name: notification_master
description: "A new Flutter project."
version: 0.0.3
homepage:

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.1
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter:

  plugin:
    platforms:
      android:
        package: com.example.notification_master
        pluginClass: NotificationMasterPlugin
      ios:
        pluginClass: NotificationMasterPlugin
      linux:
        pluginClass: NotificationMasterPlugin
      macos:
        pluginClass: NotificationMasterPlugin
      windows:
        pluginClass: NotificationMasterPluginCApi
      web:
        pluginClass: NotificationMasterWeb
        fileName: notification_master_web.dart

